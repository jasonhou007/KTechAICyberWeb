name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Playwright E2E Tests
    # #229 AC #4: webkit + Mobile Safari now run in this job (RUN_WEBKIT=true
    # below). With 4 projects × ~28 specs under webkit's slower engine, the
    # prior 15m budget cancelled the job mid-run (PR #243 run 28410495122 was
    # CANCELLED at 15m22s with webkit still executing, before any reporter
    # produced a result). 25m gives webkit headroom while keeping fast
    # chromium/firefox feedback; well under the 6h GitHub job cap.
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build application
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          # #229 AC #3: re-enable webkit + Mobile Safari in the main E2E job.
          # The webkit browser binaries are installed in the step above
          # (npx playwright install --with-deps chromium firefox webkit); this
          # flag opts the webkit/Mobile-Safari projects in (see playwright.config.ts).
          # The two per-test actionability races that gated webkit out (#216) are
          # resolved by this ticket: 87-privacy-policy (strict footer-link
          # locator, AC #1) and 187-rum-beacon (scroll-into-view before toggle
          # click, AC #2). test-smoke + test-mobile remain webkit-free (out of
          # scope for #229 — noted as follow-up in the PR body).
          RUN_WEBKIT: 'true'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: test-results.json
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 30

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright-traces/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: 'junit-results.xml'
          reporter: java-junit
          fail-on-error: true

  test-smoke:
    name: Smoke Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build application
        run: npm run build

      - name: Run smoke tests only
        run: npx playwright test --grep @smoke

  test-mobile:
    name: Mobile Tests
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build application
        run: npm run build

      - name: Run mobile viewport tests
        run: npx playwright test --project="Mobile Chrome"
