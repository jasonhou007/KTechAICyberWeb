# Lighthouse CI performance regression gate (Issue #253 AC #11).
#
# Runs Lighthouse against the 5 key routes (Home, About, Services, Contact,
# News) on every PR and asserts a minimum Performance score per route. The
# action (treosh/lighthouse-ci-action@v11) bundles its own Lighthouse binary —
# it is a GitHub Action, NOT an npm dependency, so it does NOT bloat the shared
# node_modules (5 dev lanes share one tree; we deliberately avoid adding
# lighthouse as a devDependency).
#
# SCOPE NOTE (#253): this workflow is the CI scaffold (AC #11). The
# device-runtime Lighthouse score verification (LCP<2.5s, INP<200ms, TTI<3.8s,
# score>=90 on real devices) is deferred to follow-up #302 — this gate runs
# Lighthouse in CI against the built preview and asserts a Performance score
# threshold, which is the regression-detection half of the AC. Tuning the
# thresholds to >=90 (AC #10) and verifying field-device numbers is #302.
name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scope (security review L-1): this job only reads the
# repo and uploads Lighthouse artifacts — it never writes to the repo or
# pushes. Declaring the scope explicitly avoids inheriting an over-broad
# default GITHUB_TOKEN scope.
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build a ROOT-base audit variant for Lighthouse. The production build uses
      # Vite `base: /KTechAICyberWeb/` (GitHub Pages subpath), so its index.html
      # references assets at absolute /KTechAICyberWeb/assets/... paths. When
      # served locally at the web root (serve -s dist), those absolute asset URLs
      # do NOT resolve — the SPA fallback returns index.html (HTML) in place of
      # each .js/.css bundle, the browser renders nothing, and Lighthouse reports
      # NO_FCP, failing every audit. (This is exactly the first-run failure on
      # 2026-07-01, run 28526375311.)
      #
      # Fix: rebuild with base=/ so asset URLs are root-relative (/assets/...),
      # serve dist-audit/ at the root, and request root-relative routes in
      # lighthouserc.cjs. The app code is identical to the production build —
      # only the asset URL prefix differs, which is irrelevant for measuring
      # LCP / TBT / CLS / Performance score (the regression-detection goal).
      - name: Build (audit variant, base=/)
        run: npm run build -- --base=/ --outDir dist-audit

      - name: Start preview server
        run: |
          npx serve -s dist-audit -l 4173 &
          echo "PREVIEW_URL=http://localhost:4173/" >> $GITHUB_ENV
          # Wait for the server to be ready before Lighthouse hits it.
          npx wait-on tcp:4173 -t 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorageOutput: true

  # Mobile Lighthouse gate (#342). Mirrors the desktop `lighthouse` job above
  # but uses a SEPARATE config (lighthouserc.mobile.cjs, preset='mobile'),
  # a SEPARATE build output dir (dist-audit-mob), and a SEPARATE preview port
  # (4174) so the two jobs can run concurrently without racing on the same
  # port or outDir. The mobile gate was deferred from #302 (mobile LCP missed
  # AC on /about, /contact, /news) and again from #340 (which shipped the
  # structural mobile-LCP fixes but could not re-enable the mobile CI preset
  # until #344 made the defer-entry-CSS optimization land in the audit build).
  # With #344 merged (PR #345), the audit build reflects the deferred-CSS
  # optimization, so the mobile preset's error level reflects the real
  # end-user experience.
  lighthouse-mobile:
    name: Lighthouse Mobile Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build a ROOT-base audit variant for Lighthouse (same rationale as the
      # desktop job above: production /KTechAICyberWeb/ base breaks local
      # asset loading -> NO_FCP). Separate outDir (dist-audit-mob) so the two
      # jobs do not collide if they share a workspace cache.
      - name: Build (audit variant, base=/)
        run: npm run build -- --base=/ --outDir dist-audit-mob

      - name: Start preview server
        run: |
          npx serve -s dist-audit-mob -l 4174 &
          echo "PREVIEW_URL=http://localhost:4174/" >> $GITHUB_ENV
          # Wait for the server to be ready before Lighthouse hits it.
          npx wait-on tcp:4174 -t 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.mobile.cjs
          uploadArtifacts: true
          temporaryPublicStorageOutput: true
