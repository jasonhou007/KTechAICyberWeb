name: Auto-Deploy on Merge

# Deploy to production when PR is merged to main
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Only run if PR was merged (not just closed)
  check-merged:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.merged }}
    steps:
      - name: Check if PR was merged
        id: check
        run: |
          if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "✓ PR was merged, proceeding with deployment"
          else
            echo "merged=false" >> $GITHUB_OUTPUT
            echo "✗ PR was closed without merging, skipping deployment"
          fi

  deploy:
    needs: check-merged
    if: needs.check-merged.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # History-mode routing on GitHub Pages needs 404.html (a copy of the
      # built index.html) so a direct/refresh hit on a deep subpath serves the
      # SPA instead of GitHub's 404. Copying after build keeps the hashed
      # asset links in 404.html in sync with index.html. #140
      - name: Generate 404.html for SPA deep links
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment deployment status
        if: github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ## 🚀 Deployment Complete

              **Environment:** Production (GitHub Pages)
              **URL:** ${{ steps.deployment.outputs.page_url }}

              Merged by @${{ github.actor }} at ${new Date().toISOString()}
              `.trim()
            })

      - name: Update GitHub Project ticket status
        if: github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectNumber = 5;
            const statusName = "Done";
            const issueNumber = context.payload.pull_request.number;

            // Find project items for this issue
            const query = `query($owner: String!, $projectNumber: Int!) {
              repositoryOwner(login: $owner) {
                projectV2(number: $projectNumber) {
                  id
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue {
                          number
                        }
                      }
                      status {
                        id
                        name
                      }
                    }
                  }
                  fieldOptions(first: 100) {
                    nodes {
                      ... on ProjectV2SingleSelectFieldConfiguration {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const variables = {
              owner: context.repo.owner,
              projectNumber: projectNumber
            };

            const result = await github.graphql(query, variables);
            const project = result.repositoryOwner.projectV2;

            // Find the item for this issue
            const item = project.items.nodes.find(
              node => node.content?.number === issueNumber
            );

            if (!item) {
              console.log(`No project item found for issue #${issueNumber}`);
              return;
            }

            // Find the status field and its options
            const statusField = project.fieldOptions.nodes.find(
              field => field.name?.toLowerCase() === "status"
            );

            if (!statusField) {
              console.log("No status field found in project");
              return;
            }

            // Find the target status ID
            const statusOption = statusField.options.find(
              option => option.name === statusName
            );

            if (!statusOption) {
              console.log(`Status '${statusName}' not found. Available:`, statusField.options.map(o => o.name));
              return;
            }

            // Update the item status
            const mutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String) {
              updateProjectV2ItemFieldValue(
                input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: $value
                }
              ) {
                projectV2Item {
                  id
                }
              }
            }`;

            await github.graphql(mutation, {
              projectId: project.id,
              itemId: item.id,
              fieldId: statusField.id,
              value: statusOption.id
            });

            console.log(`✓ Updated ticket #${issueNumber} status to '${statusName}'`);
