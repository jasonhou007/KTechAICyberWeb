<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="404 - 页面未找到 | 开泰科技 - KBight Fintech">
  <meta name="robots" content="noindex, follow">
  <title>404 - 页面未找到 | 开泰科技</title>
  <style>
    :root {
      --bg: #0a0f1c;
      --cyan: #00ffcc;
      --magenta: #ff00aa;
      --txt: #e0e8ff;
      --txt2: #8a9acc;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: bold;
      color: var(--cyan);
      text-shadow: 0 0 40px var(--cyan);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-message {
      font-size: 1.5rem;
      color: var(--txt);
      margin-bottom: 2rem;
    }
    .error-description {
      font-size: 1rem;
      color: var(--txt2);
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .error-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--cyan);
      background: rgba(0, 255, 204, 0.1);
      color: var(--cyan);
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: inline-block;
    }
    .btn:hover {
      background: rgba(0, 255, 204, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
    }
    .glitch {
      animation: glitch 3s ease-in-out infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translateX(0); }
      92% { transform: translateX(-2px); }
      94% { transform: translateX(2px); }
      96% { transform: translateX(-1px); }
      98% { transform: translateX(1px); }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code glitch">404</div>
    <h1 class="error-message">页面未找到</h1>
    <p class="error-description">抱歉，您要访问的页面不存在或已被移动。</p>
    <nav class="error-links">
      <a href="/" class="btn">返回首页</a>
      <a href="/about" class="btn">关于我们</a>
    </nav>
  </div>
</body>
</html>
